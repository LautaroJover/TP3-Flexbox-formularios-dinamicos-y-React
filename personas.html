<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Ejercicio 2 - Personas (JavaScript Vanilla)</title>
  </head>
  <body>
    <nav>
      <a href="index.html" class="btn-volver">← Volver al Inicio</a>
    </nav>

    <h1>Registro de Personas (Vanilla)</h1>
    
    <form id="form-persona">
      <div>
        <label>Nombre: <input type="text" id="nombre" required></label>
        <label>Apellido: <input type="text" id="apellido" required></label>
      </div>
      <div>
        <label>Edad: <input type="number" id="edad" min="0" required></label>
        <label>Altura (m): <input type="number" id="altura" step="0.01" min="0.1" required></label>
        <label>Peso (kg): <input type="number" id="peso" step="0.1" min="1" required></label>
      </div>
      <button type="submit">Agregar Persona</button>
    </form>

    <table>
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Apellido</th>
          <th>Edad</th>
          <th>Altura (m)</th>
          <th>Peso (kg)</th>
          <th>IMC</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tabla-cuerpo">
        </tbody>
    </table>

    <script src="personas.js"></script>
  </body>
</html>
